<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root { --gold:#e0b054; --label:#e8eef5; }
  html, body { margin:0; padding:0; }
  #card {
    box-sizing:border-box; min-height:100vh; padding:14px 14px;
    background:linear-gradient(180deg,#0d1b2a 0%,#1b263b 100%);
    font-family:-apple-system,Roboto,"Segoe UI",sans-serif; color:var(--label);
    border-radius:14px; display:flex; flex-direction:column; justify-content:center;
  }
  /* Shared column grid: header and every row use .line so glyph/name/time align */
  .line { display:flex; align-items:center; padding:5px 6px; border-radius:8px; }
  .line.next { background:rgba(224,176,84,.16); }
  .glyph { flex:0 0 28px; text-align:center; color:var(--gold); }
  .name { flex:1; padding-left:8px; opacity:.9; }
  .time { color:var(--gold); font-weight:700; font-variant-numeric:tabular-nums; }
  #head { margin-bottom:6px; }
  #city { color:var(--gold); font-weight:700; letter-spacing:1.5px; opacity:1; }
  #stale { flex:0 0 auto; color:var(--gold); opacity:.4; display:none; padding-left:6px; }
  #next { text-align:center; color:var(--gold); opacity:.85; margin-top:8px; }
  #err { text-align:center; opacity:.7; margin-top:20px; display:none; }

  /* Size scales (chosen in the widget settings) */
  #card.s-regular .glyph { font-size:17px; } #card.s-regular .name, #card.s-regular #city { font-size:15px; }
  #card.s-regular .time { font-size:16px; } #card.s-regular #next { font-size:12px; }

  #card.s-large .glyph { font-size:20px; } #card.s-large .name, #card.s-large #city { font-size:18px; }
  #card.s-large .time { font-size:20px; } #card.s-large #next { font-size:13px; }
  #card.s-large .line { padding:7px 6px; }

  #card.s-xlarge .glyph { font-size:23px; } #card.s-xlarge .name, #card.s-xlarge #city { font-size:21px; }
  #card.s-xlarge .time { font-size:24px; } #card.s-xlarge #next { font-size:15px; }
  #card.s-xlarge .line { padding:9px 6px; }
</style>
</head>
<body>
<div id="card" class="s-regular">
  <div id="head" class="line">
    <span class="glyph">🌙</span>
    <span id="city" class="name">—</span>
    <span id="stale">•</span>
  </div>
  <div id="rows"></div>
  <div id="next"></div>
  <div id="err">Prayer times unavailable</div>
</div>
<script type="text/javascript">
  const GLYPH = { Dawn:"☀", Sunrise:"◐", Noon:"☉", Maghrib:"☾", Midnight:"☾" };
  const ORDER = [["Dawn","dawn"],["Sunrise","sunrise"],["Noon","noon"],["Maghrib","maghrib"],["Midnight","midnight"]];
  const SIZES = {
    regular: { cls:"s-regular", height:260 },
    large:   { cls:"s-large",   height:330 },
    xlarge:  { cls:"s-xlarge",  height:410 },
  };
  let currentCity = "London";

  function render(d) {
    document.getElementById("err").style.display = "none";
    document.getElementById("city").textContent = d.city.toUpperCase();
    document.getElementById("stale").style.display = d.stale ? "inline" : "none";
    const rows = document.getElementById("rows");
    rows.innerHTML = "";
    for (const [name, key] of ORDER) {
      const r = document.createElement("div");
      r.className = "line" + (name === d.next.name ? " next" : "");
      r.innerHTML = '<span class="glyph">' + GLYPH[name] + '</span>' +
        '<span class="name">' + name + '</span>' +
        '<span class="time">' + d[key] + '</span>';
      rows.appendChild(r);
    }
    document.getElementById("next").textContent = "Next · " + d.next.name + " " + d.next.time;
  }

  function showError() { document.getElementById("err").style.display = "block"; }

  async function load(Homey) {
    try {
      render(await Homey.api("GET", "/today?city=" + encodeURIComponent(currentCity)));
    } catch (e) {
      showError();
    }
  }

  function onHomeyReady(Homey) {
    const s = Homey.getSettings() || {};
    currentCity = s.city || "London";
    const sz = SIZES[s.size] || SIZES.regular;
    document.getElementById("card").className = sz.cls;
    load(Homey);
    // realtime push from the always-running backend (daily rollover / hourly tick)
    Homey.on("prayertimes:update", (d) => { if (d && d.city === currentCity) render(d); });
    // belt-and-suspenders while the dashboard is visible
    setInterval(() => load(Homey), 30 * 60 * 1000);
    document.addEventListener("visibilitychange", () => { if (!document.hidden) load(Homey); });
    Homey.ready({ height: sz.height });
  }
</script>
</body>
</html>
