name: Release

# Tag the repo (e.g. `git tag v1.0.0 && git push --tags`) to build the widgets
# and publish a GitHub Release with the installable assets attached.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test shared parser core
        run: node --test shared/prayer-core.test.js

      - name: Syntax-check iOS Scriptable script
        run: node --check ios-scriptable/prayer-times.js

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Android unit tests + debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/PrayerTimes-debug.apk
          cp ios-scriptable/prayer-times.js dist/prayer-times.scriptable.js
          cp ios-scriptable/install.js dist/prayer-times-installer.js
          (cd homey && zip -qr ../dist/PrayerTimes-homey-app.zip . -x '*/node_modules/*')
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/PrayerTimes-debug.apk
            dist/prayer-times.scriptable.js
            dist/prayer-times-installer.js
            dist/PrayerTimes-homey-app.zip
