name: Release

# Tag the repo (e.g. `git tag v1.0.0 && git push --tags`) to build the widgets
# and publish a GitHub Release with the installable assets attached.
#
# Signed release APK: add these repo secrets (Settings → Secrets and variables →
# Actions). If they're absent the workflow still publishes the debug APK.
#   KEYSTORE_BASE64    base64 of the signing keystore
#   KEYSTORE_PASSWORD  keystore (store) password
#   KEY_ALIAS          key alias (e.g. prayertimes)
#   KEY_PASSWORD       key password
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test shared parser core
        run: node --test shared/prayer-core.test.js

      - name: Syntax-check iOS Scriptable script
        run: node --check ios-scriptable/prayer-times.js

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Android unit tests + debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Decode signing keystore
        if: env.HAS_SIGNING == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Build signed release APK
        if: env.HAS_SIGNING == 'true'
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/PrayerTimes-debug.apk
          if [ "$HAS_SIGNING" = "true" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk dist/PrayerTimes-release.apk
          fi
          cp ios-scriptable/prayer-times.js dist/prayer-times.scriptable.js
          cp ios-scriptable/install.js dist/prayer-times-installer.js
          (cd homey && zip -qr ../dist/PrayerTimes-homey-app.zip . -x '*/node_modules/*')
          ls -la dist

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/keystore.jks

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/*
